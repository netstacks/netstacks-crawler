# NetStacks Crawler — single-file stack. Run it with:
#
#   docker compose up --build -d
#
# Then open http://localhost:5000 (set CRAWLER_PORT to change the port).
# This is intentionally simple; for production add your own overrides
# (registry images, replicas, secrets, TLS, host networking, etc.).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawler}
      POSTGRES_DB: crawler
    command: ["postgres", "-c", "max_connections=300",
              "-c", "idle_in_transaction_session_timeout=5min",
              "-c", "lock_timeout=60s"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d crawler -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  backend:
    build: .
    image: netstacks-crawler:latest
    environment:
      DATABASE_URL: postgresql://crawler:${POSTGRES_PASSWORD:-crawler}@postgres:5432/crawler
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    image: netstacks-crawler:latest
    command: ["crawler-backend-fg"]
    environment:
      DATABASE_URL: postgresql://crawler:${POSTGRES_PASSWORD:-crawler}@postgres:5432/crawler
      CRAWLER_ROLE: worker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${CRAWLER_PORT:-5000}:5000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
