# Main nginx config for the web image. Mirrors the stock nginx:stable file but
# loads the njs module so alb-auth.js can verify the AWS ALB OIDC JWT (see the
# /_alb_auth handler wired in conf.d/default.conf).

load_module modules/ngx_http_js_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $alb_remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    # ALB OIDC JWT verification (see /etc/nginx/njs/alb-auth.js). The handler
    # fetches the ALB's regional public key over HTTPS, so njs needs a DNS
    # resolver and a CA bundle. 127.0.0.11 is Docker's embedded DNS, which also
    # forwards external lookups (e.g. *.amazonaws.com).
    js_import alb_auth from /etc/nginx/njs/alb-auth.js;
    js_var $alb_remote_user;
    resolver 127.0.0.11 ipv6=off valid=300s;
    js_fetch_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

    include /etc/nginx/conf.d/*.conf;
}
