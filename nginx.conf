server {
    listen 5000;

    root /usr/share/nginx/html;
    index index.html;

    # API + backend routes → Perl backend. alb-auth.js verifies the ALB OIDC
    # JWT's ES256 signature, stashes the verified email in $alb_remote_user, then
    # internal-redirects to @backend below.
    location /api/ {
        js_content alb_auth.authAndForward;
    }

    location @backend {
        internal;
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Identity comes ONLY from the signature-verified ALB JWT. This
        # unconditionally overwrites any X-Remote-User the client sent; a
        # forged/unsigned token leaves it empty (nginx then omits the header),
        # so trust_x_remote_user cannot be spoofed even by a client reaching the
        # container directly. Empty => backend falls back to its no_auth guest.
        proxy_set_header X-Remote-User $alb_remote_user;
    }

    location /health {
        proxy_pass http://backend:5000;
    }

    location /metrics {
        proxy_pass http://backend:5000;
    }

    location /info {
        proxy_pass http://backend:5000;
    }

    location /swagger.json {
        proxy_pass http://backend:5000;
    }

    location /swagger-ui {
        proxy_pass http://backend:5000;
    }

    # SPA client-side routing — serve index.html for all non-file paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
